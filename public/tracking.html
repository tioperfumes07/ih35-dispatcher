<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IH35 — Vehicle tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/css/board-nav.css" />
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f6fa; color: #17212f; }
    .layout { display: grid; grid-template-columns: minmax(280px, 360px) 1fr; min-height: calc(100vh - 52px); }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    .side { border-right: 1px solid #d8deea; background: #fff; display: flex; flex-direction: column; }
    .side-head { padding: 14px 16px; border-bottom: 1px solid #edf1f7; }
    .side-head h1 { margin: 0; font-size: 18px; }
    .side-head p { margin: 6px 0 0; font-size: 12px; color: #64748b; line-height: 1.4; }
    #fleetSearch { width: calc(100% - 32px); margin: 10px 16px; padding: 9px 11px; border: 1px solid #d8deea; border-radius: 10px; font: inherit; box-sizing: border-box; }
    .fleet-list { flex: 1; overflow: auto; padding: 0 8px 16px; }
    .v-card { padding: 10px 12px; margin: 0 8px 8px; border: 1px solid #e8eef8; border-radius: 10px; cursor: pointer; background: #fafcff; font-size: 13px; }
    .v-card:hover { border-color: #bcd0ff; }
    .v-card.on { background: #eff6ff; border-color: #93c5fd; }
    .v-card b { display: block; margin-bottom: 4px; }
    .v-card .sub { font-size: 11px; color: #64748b; line-height: 1.35; }
    #map { height: min(720px, calc(100vh - 120px)); width: 100%; z-index: 1; }
    .map-wrap { padding: 12px; background: #e2e8f0; }
    .banner { padding: 10px 16px; font-size: 13px; background: #fff7ed; color: #9a3412; border-bottom: 1px solid #fed7aa; }
    .banner.err { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .meta { padding: 8px 16px; font-size: 12px; color: #64748b; background: #fff; border-bottom: 1px solid #edf1f7; }
  </style>
</head>
<body>
  <div id="boardNavMount"></div>
  <div id="statusBanner"></div>
  <div class="meta" id="metaLine">Loading Samsara fleet positions…</div>
  <div class="layout">
    <aside class="side">
      <div class="side-head">
        <h1>Live fleet</h1>
        <p>Assets match Samsara naming (e.g. T160). Same units appear on Maintenance. Set <code>SAMSARA_API_TOKEN</code> for live data.</p>
      </div>
      <input id="fleetSearch" type="search" placeholder="Filter by unit name…" autocomplete="off" />
      <div class="fleet-list" id="fleetList"></div>
    </aside>
    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/js/board-nav.js" defer></script>
  <script>
    let map;
    let layerGroup;
    let vehicles = [];
    let selectedName = '';

    function showBanner(text, isErr) {
      const el = document.getElementById('statusBanner');
      if (!text) { el.innerHTML = ''; return; }
      el.innerHTML = '<div class="banner' + (isErr ? ' err' : '') + '">' + escapeHtml(text) + '</div>';
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function initMap() {
      if (map) return;
      map = L.map('map').setView([32.8, -96.8], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      layerGroup = L.layerGroup().addTo(map);
    }

    function renderList() {
      const q = document.getElementById('fleetSearch').value.trim().toLowerCase();
      const list = document.getElementById('fleetList');
      const filtered = vehicles.filter(v => !q || String(v.name || '').toLowerCase().includes(q));
      list.innerHTML = filtered.map(v => {
        const on = v.name === selectedName ? ' on' : '';
        const lat = v.latitude;
        const lng = v.longitude;
        const pos = lat != null && lng != null ? 'GPS · ' + Number(lat).toFixed(4) + ', ' + Number(lng).toFixed(4) : 'No GPS in last stats poll';
        return (
          '<div class="v-card' + on + '" data-name="' + escapeHtml(v.name) + '">' +
          '<b>' + escapeHtml(v.name) + '</b>' +
          '<div class="sub">' + escapeHtml([v.make, v.model].filter(Boolean).join(' ')) + '</div>' +
          '<div class="sub">Fuel: ' + (v.fuelPercent != null ? Math.round(v.fuelPercent) + '%' : '—') +
          ' · Mi: ' + (v.odometerMiles != null ? Number(v.odometerMiles).toLocaleString() : '—') + '</div>' +
          '<div class="sub">' + escapeHtml(pos) + '</div>' +
          '</div>'
        );
      }).join('') || '<p class="sub" style="padding:12px 20px">No vehicles. Check API token and filters in <code>server.js</code> (tracked asset range).</p>';

      list.querySelectorAll('.v-card').forEach(card => {
        card.addEventListener('click', () => selectVehicle(card.getAttribute('data-name')));
      });
    }

    function selectVehicle(name) {
      selectedName = name;
      renderList();
      renderMarkers();
      const v = vehicles.find(x => x.name === name);
      if (v && v.latitude != null && v.longitude != null) {
        map.setView([v.latitude, v.longitude], Math.max(map.getZoom(), 9));
      }
    }

    function renderMarkers() {
      if (!layerGroup) return;
      layerGroup.clearLayers();
      const bounds = [];
      for (const v of vehicles) {
        if (v.latitude == null || v.longitude == null) continue;
        bounds.push([v.latitude, v.longitude]);
        const m = L.circleMarker([v.latitude, v.longitude], {
          radius: v.name === selectedName ? 10 : 7,
          color: v.name === selectedName ? '#1d4ed8' : '#334155',
          fillColor: v.name === selectedName ? '#3b82f6' : '#64748b',
          fillOpacity: 0.85
        });
        m.bindPopup('<b>' + escapeHtml(v.name) + '</b><br>' + escapeHtml(v.engineState || '') + '<br>Fuel ' + (v.fuelPercent != null ? Math.round(v.fuelPercent) + '%' : '—'));
        m.on('click', () => { selectedName = v.name; renderList(); });
        layerGroup.addLayer(m);
      }
      if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 8 });
    }

    document.getElementById('fleetSearch').addEventListener('input', renderList);

    (async function load() {
      initMap();
      try {
        const r = await fetch('/api/maintenance/dashboard');
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.error || r.statusText);
        vehicles = j.vehicles || [];
        document.getElementById('metaLine').textContent =
          'Showing ' + vehicles.length + ' tracked asset(s) · Samsara stats merged · ' + new Date().toLocaleTimeString();
        if (!vehicles.length) {
          showBanner('No vehicles returned. Confirm SAMSARA_API_TOKEN and asset filters (see server isTrackedAsset).', true);
        }
        renderList();
        renderMarkers();
        const withGps = vehicles.filter(v => v.latitude != null && v.longitude != null);
        if (withGps.length && !selectedName) selectVehicle(withGps[0].name);
      } catch (e) {
        showBanner(e.message || String(e), true);
        document.getElementById('metaLine').textContent = 'Failed to load fleet data.';
      }
    })();
  </script>
</body>
</html>
