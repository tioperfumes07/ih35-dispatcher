# Agent B — Rule 0 offline scan + HTTP smoke (`qa:isolated`), same as local full gate without a manual server.
name: Rule 0 (Agent B)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rule0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rule0-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
      # Per-fetch ceiling in scripts/system-smoke.mjs (default 10000 ms); CI runners can be noisy.
      SMOKE_TIMEOUT_MS: '15000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install fleet-reports-hub dependencies
        run: npm ci --prefix apps/fleet-reports-hub
      - name: Build embedded fleet reports SPA
        run: npm run build:fleet
      - name: Full gate (smoke-gate sync, rule0:check, smoke on ephemeral server)
        run: npm run qa:isolated
