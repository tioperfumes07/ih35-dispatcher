# Agent B — Rule 0 offline scan + HTTP smoke (`qa:isolated`), same as local full gate without a manual server.
name: Rule 0 (Agent B)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rule0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rule0-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
      # Per-fetch ceiling in scripts/system-smoke.mjs (default 10000 ms); CI runners can be noisy.
      SMOKE_TIMEOUT_MS: '15000'
      # Keep native addon installs deterministic in CI.
      npm_config_build_from_source: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/fleet-reports-hub/package-lock.json
      - name: Verify Node runtime
        run: node -v
      - name: Clean install
        run: |
          npm ci
          cd apps/fleet-reports-hub && npm ci && cd ../..
      - name: Build embedded fleet reports SPA
        run: npm run build:fleet
      - name: Rebuild better-sqlite3
        run: |
          cd apps/fleet-reports-hub
          npm install --ignore-scripts
          npm rebuild better-sqlite3
          cd ../..
      - name: Force reinstall better-sqlite3
        run: |
          cd apps/fleet-reports-hub
          npm uninstall better-sqlite3
          npm install better-sqlite3 --save
          cd ../..
      - name: Full gate (smoke-gate sync, rule0:check, smoke on ephemeral server)
        run: npm run qa:isolated
