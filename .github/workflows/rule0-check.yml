# Agent B — Rule 0 token stacks (no server). `npm test` → `rule0:check` only.
# Full gate with HTTP smoke requires a running server locally: `npm run qa:automated`.
name: Rule 0 (Agent B)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rule0-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Forbidden var(--color-*…) stacks
        run: npm test
